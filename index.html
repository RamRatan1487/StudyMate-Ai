<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { 
              console.warn("Prevented window.fetch override attempt:", val);
              originalFetch = val; 
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch getter/setter:", e);
        }
        try {
          Object.defineProperty(globalThis, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { 
              console.warn("Prevented globalThis.fetch override attempt:", val);
              originalFetch = val; 
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine globalThis.fetch getter/setter:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
